<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSort-Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a href="{{ url_for('index') }}" class="brand">
                <span class="brand__logo">&#9851;&#65039;</span>
                <span class="brand__text">
                    <strong>EcoSort</strong><span class="brand__accent">Search</span>
                </span>
            </a>
            <p class="site-header__tagline">Trouvez la bonne poubelle pour votre produit</p>
        </div>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p class="site-footer__title">Les 5 catégories de tri</p>
        <div class="legend">
            <span class="legend__item"><i class="legend__dot" style="background:#F5B700"></i>Jaune &mdash; plastique, métal, carton</span>
            <span class="legend__item"><i class="legend__dot" style="background:#16A34A"></i>Verte &mdash; verre</span>
            <span class="legend__item"><i class="legend__dot" style="background:#2563EB"></i>Bleue &mdash; papier</span>
            <span class="legend__item"><i class="legend__dot" style="background:#52525B"></i>D3E &mdash; électronique</span>
            <span class="legend__item"><i class="legend__dot" style="background:#7C4A1E"></i>Marron &mdash; résiduel</span>
        </div>
    </footer>
</body>
</html>
